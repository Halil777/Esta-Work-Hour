# /etc/nginx/sites-available/workhour
# symlink: ln -s /etc/nginx/sites-available/workhour /etc/nginx/sites-enabled/workhour

server {
    listen 80;
    server_name 161.104.17.113;

    # API — proxy to backend (PM2 running on 3002)
    location /api/ {
        proxy_pass         http://127.0.0.1:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Uploaded files (worker photos, etc.)
    location /uploads/ {
        alias /home/Esta-Work-Hour/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Tenant Admin SPA
    location / {
        root  /home/Esta-Work-Hour/tenant-admin/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 3001;
    server_name 161.104.17.113;

    # API — proxy to backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Super Admin SPA
    location / {
        root  /home/Esta-Work-Hour/super-admin/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
